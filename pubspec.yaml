name: h2o_plc
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  firebase_storage: ^13.2.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_database: ^12.2.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  mobile_scanner: ^7.2.0
  percent_indicator: ^4.2.5
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  workmanager: ^0.9.0+3
  flutter_background_service: ^5.1.0
  permission_handler: ^12.0.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Dito dapat ang package
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg

# Dito sa pinakababa ang configuration. 
# Siguraduhin na may DALAWANG SPACES bago ang android, ios, etc.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.jpg"